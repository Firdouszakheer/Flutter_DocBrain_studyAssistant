name: docbrain
description: DocBrain - AI-Powered Document Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  
  # File picking
  file_picker: ^6.1.1
  
  # HTTP requests (Anthropic API)
  http: ^1.1.0
  
  # Animations
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  
  # Document parsing
  syncfusion_flutter_pdf: ^25.1.41
  
  # Markdown rendering
  flutter_markdown: ^0.6.22
  
  # State management
  provider: ^6.1.1
  
  # UI extras
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  confetti: ^0.7.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
