<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DocBrain - AI-Powered Document Intelligence">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DocBrain">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>DocBrain — AI Study Assistant</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Google Fonts for DocBrain -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050811;
      overflow: hidden;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #050811;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: #00F5FF;
      letter-spacing: 6px;
      text-shadow: 0 0 30px rgba(0,245,255,0.6), 0 0 60px rgba(0,245,255,0.2);
      margin-bottom: 8px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    .loading-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      color: rgba(0,245,255,0.6);
      letter-spacing: 4px;
      margin-bottom: 48px;
    }
    .loading-bar-container {
      width: 200px;
      height: 2px;
      background: rgba(0,245,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #00F5FF, #BF5FFF, #FF2D78);
      animation: loading 2s ease-in-out infinite;
    }
    .loading-dots {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }
    .loading-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00F5FF;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; background: #BF5FFF; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; background: #FF2D78; }
    @keyframes glow {
      from { text-shadow: 0 0 20px rgba(0,245,255,0.4); }
      to { text-shadow: 0 0 40px rgba(0,245,255,0.8), 0 0 80px rgba(0,245,255,0.3); }
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-logo">DOCBRAIN</div>
    <div class="loading-sub">AI STUDY ASSISTANT</div>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      const screen = document.getElementById('loading-screen');
      screen.style.opacity = '0';
      setTimeout(() => screen.remove(), 500);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
